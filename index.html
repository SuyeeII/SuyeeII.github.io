<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>校园猫咪档案（共享版）</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
body{margin:0;padding:16px;background:#f6f7f9;color:#222}
.container{max-width:700px;margin:0 auto}
h1{text-align:center;margin-bottom:12px}
.search-box{
  width:100%;padding:10px 12px;
  border:1px solid #ddd;border-radius:8px;
  margin-bottom:16px;font-size:16px
}
.form{
  background:#fff;padding:16px;border-radius:12px;
  margin-bottom:20px;box-shadow:0 2px 6px #0001
}
.form input,.form textarea{
  width:100%;margin-bottom:10px;padding:10px;
  border:1px solid #ddd;border-radius:8px
}
.form button{
  width:100%;padding:12px;background:#4e8aff;
  color:#fff;border:none;border-radius:8px;font-size:16px
}
.cat-card{
  background:#fff;border-radius:12px;padding:14px;
  margin-bottom:12px;box-shadow:0 2px 6px #0001
}
.cat-card img{
  width:100%;height:auto;border-radius:8px;
  max-height:360px;object-fit:cover
}
.cat-card h3{margin:10px 0 4px}
.cat-card p{margin:4px 0;color:#555}
.cat-card small{color:#999;font-size:12px}
.desc{white-space:pre-line}
.required-tip{color:#ff4444;font-size:12px;margin:-8px 0 8px 0}
</style>
</head>
<body>
<div class="container">
  <h1>校园猫咪档案（共享版）</h1>
  <input 
    type="text" 
    class="search-box" 
    placeholder="🔍 搜索猫咪名字" 
    oninput="render()"
    id="search"
  >
  <form class="form" id="catForm">
    <input id="name" placeholder="猫咪名字（必填）">
    <div class="required-tip">* 仅名字为必填项，其他信息可选填</div>
    <input id="age" placeholder="年龄（岁）">
    <input id="weight" placeholder="体重（kg）">
    <textarea id="desc" rows="3" placeholder="描述、性格、经常出现位置"></textarea>
    <input type="file" id="photo" accept="image/*">
    <button type="button" onclick="addCat()">发布猫咪</button>
  </form>
  <div id="cat-list"></div>
</div>

<script>
// 零注册云端存储：用 jsonstore.io（免费、无需账号）
// 替换成你自己的唯一key（随便写一串字母数字，比如 campus-cats-20260309）
const UNIQUE_KEY = "campus-cats-suyeeii-2026";
const API_URL = `https://www.jsonstore.io/${UNIQUE_KEY}`;

// 初始化：如果云端无数据，创建空数组
async function initStore() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (!data.result) {
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify([])
      });
    }
  } catch (e) {
    console.log("初始化存储", e);
  }
}

// 读取云端所有猫咪
async function getCats() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    return data.result || [];
  } catch (e) {
    return [];
  }
}

// 保存猫咪到云端
async function saveCats(cats) {
  try {
    await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cats)
    });
    return true;
  } catch (e) {
    return false;
  }
}

// 上传图片到免费图床（sm.ms，零注册）
async function uploadPhoto(file) {
  if (!file) return "";
  const formData = new FormData();
  formData.append("smfile", file);
  try {
    const res = await fetch("https://sm.ms/api/v2/upload", {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    return data.success ? data.data.url : "";
  } catch (e) {
    return "";
  }
}

// 添加猫咪（姓名必填）
async function addCat() {
  const name = document.getElementById("name").value.trim();
  if (!name) {
    alert("请填写猫咪的名字哦～这是唯一必填项");
    return;
  }

  const age = document.getElementById("age").value.trim() || "未知";
  const weight = document.getElementById("weight").value.trim() || "未知";
  const desc = document.getElementById("desc").value.trim() || "暂无描述";
  const photoFile = document.getElementById("photo").files[0];
  const photo = await uploadPhoto(photoFile);
  const time = new Date().toLocaleString();

  const cats = await getCats();
  cats.unshift({
    id: Date.now(),
    name,
    age,
    weight,
    desc,
    photo,
    time
  });

  const ok = await saveCats(cats);
  if (ok) {
    alert("发布成功！所有同学都能看到这只小可爱啦～");
    document.getElementById("catForm").reset();
    render();
  } else {
    alert("发布失败，请稍后重试");
  }
}

// 渲染列表（带搜索）
async function render() {
  const list = document.getElementById("cat-list");
  const keyword = document.getElementById("search").value.toLowerCase();
  const cats = await getCats();

  const filtered = cats.filter(cat =>
    cat.name.toLowerCase().includes(keyword)
  );

  if (filtered.length === 0) {
    list.innerHTML = `<p style="text-align:center; color:#666; padding:20px">暂无猫咪档案，快来添加第一只吧～</p>`;
    return;
  }

  list.innerHTML = filtered.map(cat => `
    <div class="cat-card">
      ${cat.photo ? `<img src="${cat.photo}" alt="${cat.name}">` : ''}
      <h3>${cat.name}</h3>
      <p>年龄：${cat.age} ｜ 体重：${cat.weight} kg</p>
      <p class="desc">${cat.desc}</p>
      <small>添加时间：${cat.time}</small>
    </div>
  `).join("");
}

// 页面加载时初始化并渲染
window.onload = async () => {
  await initStore();
  render();
};
</script>
</body>
</html>
