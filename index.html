<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>校园猫咪档案（共享版）</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
body{margin:0;padding:16px;background:#f6f7f9;color:#222}
.container{max-width:700px;margin:0 auto}
h1{text-align:center;margin-bottom:12px}
.search-box{
  width:100%;padding:10px 12px;
  border:1px solid #ddd;border-radius:8px;
  margin-bottom:16px;font-size:16px
}
.form{
  background:#fff;padding:16px;border-radius:12px;
  margin-bottom:20px;box-shadow:0 2px 6px #0001
}
.form input,.form textarea{
  width:100%;margin-bottom:10px;padding:10px;
  border:1px solid #ddd;border-radius:8px
}
.form button{
  width:100%;padding:12px;background:#4e8aff;
  color:#fff;border:none;border-radius:8px;font-size:16px
}
.cat-card{
  background:#fff;border-radius:12px;padding:14px;
  margin-bottom:12px;box-shadow:0 2px 6px #0001
}
.cat-card img{
  width:100%;height:auto;border-radius:8px;
  max-height:360px;object-fit:cover
}
.cat-card h3{margin:10px 0 4px}
.cat-card p{margin:4px 0;color:#555}
.cat-card small{color:#999;font-size:12px}
.desc{white-space:pre-line}
.required-tip{color:#ff4444;font-size:12px;margin:-8px 0 8px 0}
</style>
</head>
<body>
<div class="container">
  <h1>校园猫咪档案（共享版）</h1>
  <input 
    type="text" 
    class="search-box" 
    placeholder="🔍 搜索猫咪名字" 
    oninput="render()"
    id="search"
  >
  <form class="form" id="catForm">
    <input id="name" placeholder="猫咪名字（必填）">
    <div class="required-tip">* 仅名字为必填项，其他信息可选填</div>
    <input id="age" placeholder="年龄（岁）">
    <input id="weight" placeholder="体重（kg）">
    <textarea id="desc" rows="3" placeholder="描述、性格、经常出现位置"></textarea>
    <input type="file" id="photo" accept="image/*">
    <button type="button" onclick="addCat()">发布猫咪</button>
  </form>
  <div id="cat-list"></div>
</div>

<script>
// 核心配置：替换为你的 GitHub 仓库信息
const GITHUB_USER = "SuyeeII";
const REPO = "suyeeii.github.io";
// GitHub Issues 接口（无需认证，公开可读可写）
const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${REPO}/issues`;

// 图片压缩（避免 Issues 内容过长）
async function compressImage(file) {
  if (!file) return "";
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => {
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        // 压缩到 800px 宽
        const scale = 800 / img.width;
        canvas.width = 800;
        canvas.height = img.height * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        // 转为 base64（低质量，减小体积）
        resolve(canvas.toDataURL("image/jpeg", 0.6));
      };
    };
    reader.readAsDataURL(file);
  });
}

// 读取云端猫咪数据（从 GitHub Issues）
async function getCats() {
  try {
    const res = await fetch(`${API_URL}?labels=cat&sort=created&direction=desc`);
    if (!res.ok) throw new Error("获取数据失败");
    const issues = await res.json();
    // 解析 Issues 内容为猫咪数据
    return issues.map(issue => {
      try {
        return JSON.parse(issue.body);
      } catch (e) {
        return null;
      }
    }).filter(Boolean);
  } catch (e) {
    console.error("读取失败：", e);
    return [];
  }
}

// 发布猫咪数据（写入 GitHub Issues）
async function addCat() {
  const name = document.getElementById("name").value.trim();
  if (!name) {
    alert("请填写猫咪的名字哦～这是唯一必填项");
    return;
  }

  // 收集表单数据
  const age = document.getElementById("age").value.trim() || "未知";
  const weight = document.getElementById("weight").value.trim() || "未知";
  const desc = document.getElementById("desc").value.trim() || "暂无描述";
  const photoFile = document.getElementById("photo").files[0];
  const photo = photoFile ? await compressImage(photoFile) : "";
  const time = new Date().toLocaleString();

  // 组装 Issues 数据
  const catData = { name, age, weight, desc, photo, time };
  const issueData = {
    title: `猫咪档案：${name}`,
    body: JSON.stringify(catData),
    labels: ["cat"] // 标记为猫咪档案，方便筛选
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Accept": "application/vnd.github.v3+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(issueData)
    });

    if (res.ok) {
      alert("发布成功！所有设备都能看到这只猫咪啦～");
      document.getElementById("catForm").reset();
      render(); // 重新渲染列表
    } else {
      // 处理 403 限流：提示等待
      if (res.status === 403) {
        alert("发布失败：访问过于频繁，请等待1分钟后重试");
      } else {
        alert("发布失败：请检查网络后重试");
      }
    }
  } catch (e) {
    alert("发布失败：网络连接异常");
  }
}

// 渲染猫咪列表（带搜索）
async function render() {
  const list = document.getElementById("cat-list");
  const keyword = document.getElementById("search").value.toLowerCase();
  const cats = await getCats();

  // 搜索过滤
  const filteredCats = cats.filter(cat => 
    cat.name.toLowerCase().includes(keyword)
  );

  // 空数据提示
  if (filteredCats.length === 0) {
    list.innerHTML = `<p style="text-align:center; color:#666; padding:20px">暂无猫咪档案，快来添加第一只吧～</p>`;
    return;
  }

  // 渲染卡片
  list.innerHTML = filteredCats.map(cat => `
    <div class="cat-card">
      ${cat.photo ? `<img src="${cat.photo}" alt="${cat.name}">` : ""}
      <h3>${cat.name}</h3>
      <p>年龄：${cat.age} ｜ 体重：${cat.weight} kg</p>
      <p class="desc">${cat.desc}</p>
      <small>添加时间：${cat.time}</small>
    </div>
  `).join("");
}

// 页面加载时渲染
window.onload = render;
</script>
</body>
</html>
